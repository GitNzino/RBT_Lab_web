name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy CNAME to dist
        run: cp CNAME dist/

      - name: Create /investor route with dedicated SEO meta
        run: |
          mkdir -p dist/investor
          sed \
            -e 's#https://www.rbtlab.tech/"#https://www.rbtlab.tech/investor/"#g' \
            -e 's#RBT Lab - Think Human. Act Robotic.#Invest in RBT Lab - Investor Relations#g' \
            -e 's#Validated, collaborative robotic modules that give SMEs affordable automation without integration risk.#Invest in RBT Lab: collaborative robotics for SMEs, with market sizing, positioning and the current funding round.#g' \
            dist/index.html > dist/investor/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
